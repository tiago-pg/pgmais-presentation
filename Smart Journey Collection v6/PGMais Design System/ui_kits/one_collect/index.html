<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>ONE Collect · PGMais</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0a1230;font-family:'Poppins',sans-serif;color:#ededed}
  #app{display:flex;min-height:100vh}
  .main{flex:1;background:#172c66;display:flex;flex-direction:column;min-width:0}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(237,237,237,.1);border-radius:4px}
</style></head>
<body>
<div id="app">
  <div id="sb"></div>
  <div class="main">
    <div id="tb"></div>
    <div id="kpi"></div>
    <div id="tbl"></div>
  </div>
  <div id="ai"></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="KpiRow.jsx"></script>
<script type="text/babel" src="JourneyTable.jsx"></script>
<script type="text/babel" src="AiPanel.jsx"></script>
<script type="text/babel">
  setTimeout(() => {
    const mount = (id, C) => ReactDOM.createRoot(document.getElementById(id)).render(<C/>);
    mount('sb', Sidebar);
    mount('tb', TopBar);
    mount('kpi', KpiRow);
    mount('tbl', JourneyTable);
    mount('ai', AiPanel);
  }, 50);
</script>
</body></html>
