<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px;gap:10px">
  <div class="label">Spacing · 4 / 8px base</div>
  <div class="row" style="gap:14px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:4px;height:4px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">1 · 4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:8px;height:8px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">2 · 8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:12px;height:12px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">3 · 12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:16px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">4 · 16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:24px;height:24px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">6 · 24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:32px;height:32px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">8 · 32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:48px;height:48px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">12 · 48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:64px;height:64px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">16 · 64</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:96px;height:96px;background:#172c66;border-radius:2px"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">24 · 96</div></div>
  </div>
  <div class="small">Em dúvida? Adicione 50% mais respiro. Minimalismo funcional exige ar.</div>
</body></html>
