<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:22px;gap:12px;background:#f3f4f8">
  <div class="row" style="gap:14px;align-items:stretch">
    <div style="flex:1;padding:18px;background:#fff;border-radius:20px;box-shadow:0 1px 2px rgba(23,44,102,.06);border:1px solid rgba(23,44,102,.08);display:flex;flex-direction:column;gap:8px">
      <div style="font-family:'Lato',sans-serif;font-weight:500;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#4a4e5e">Recuperação</div>
      <div style="font-family:'Lato',sans-serif;font-weight:900;font-size:30px;color:#172c66;line-height:1">+48%</div>
      <div style="font-family:'Poppins',sans-serif;font-size:12px;color:#4a4e5e">lift médio em clientes PGMais</div>
    </div>
    <div style="flex:1.5;padding:18px;background:#172c66;border-radius:20px;color:#ededed;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden">
      <div style="position:absolute;inset:-30% -20% auto auto;width:220px;height:220px;background:radial-gradient(circle at 30% 30%,rgba(64,235,79,.35),transparent 60%),radial-gradient(circle at 70% 70%,rgba(1,32,235,.4),transparent 60%);filter:blur(12px)"></div>
      <div style="font-family:'Lato',sans-serif;font-weight:500;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(237,237,237,.72);position:relative">Hero card</div>
      <div style="font-family:'Lato',sans-serif;font-weight:700;font-size:22px;line-height:1.15;position:relative">Transformando dados em<br>clareza para a decisão.</div>
      <div style="font-family:'Poppins',sans-serif;font-size:12px;color:rgba(237,237,237,.72);position:relative">Sabedoria aplicada ao relacionamento digital.</div>
    </div>
  </div>
</body></html>
