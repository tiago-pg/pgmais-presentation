<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Core palette</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px;gap:10px">
  <div class="row" style="gap:12px">
    <!-- 4 core colors, each with swatch + label + hex -->
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="height:90px;border-radius:14px;background:#172c66"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:13px">Azul Escuro</div>
        <div class="mono" style="color:var(--fg-muted)">#172C66</div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="height:90px;border-radius:14px;background:#0120eb"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:13px">Azul Vibrante</div>
        <div class="mono" style="color:var(--fg-muted)">#0120EB</div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="height:90px;border-radius:14px;background:#40eb4f"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:13px">Verde</div>
        <div class="mono" style="color:var(--fg-muted)">#40EB4F</div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="height:90px;border-radius:14px;background:#ededed;border:1px solid rgba(23,44,102,.08)"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:13px">Cinza Claro</div>
        <div class="mono" style="color:var(--fg-muted)">#EDEDED</div>
      </div>
    </div>
  </div>
  <div class="small" style="margin-top:2px">4 cores fundamentais — cada matiz desempenha um papel inegociável na estruturação de interfaces.</div>
</body></html>
