<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Gradients</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px;gap:12px">
  <div class="row" style="gap:12px;align-items:stretch">
    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div style="height:90px;border-radius:14px;background:linear-gradient(90deg,#40eb4f 0%,#0120eb 100%)"></div>
      <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">Brand · horizontal</div>
      <div class="mono" style="color:var(--fg-muted);font-size:10px">#40EB4F → #0120EB</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div style="height:90px;border-radius:14px;background:linear-gradient(135deg,#40eb4f 0%,#0120eb 100%)"></div>
      <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">Brand · diagonal</div>
      <div class="mono" style="color:var(--fg-muted);font-size:10px">135°</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div style="height:90px;border-radius:14px;background:#172c66;position:relative;overflow:hidden">
        <div style="position:absolute;inset:-20%;background:radial-gradient(60% 80% at 20% 30%,rgba(64,235,79,.55) 0%,transparent 60%),radial-gradient(60% 80% at 80% 70%,rgba(1,32,235,.55) 0%,transparent 60%);filter:blur(8px)"></div>
      </div>
      <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">Hero blob</div>
      <div class="mono" style="color:var(--fg-muted);font-size:10px">radial · low-sat</div>
    </div>
  </div>
  <div class="small">Degradês estratégicos em pontos de destaque e molduras. Preservam equity histórico, otimizam contraste digital.</div>
</body></html>
