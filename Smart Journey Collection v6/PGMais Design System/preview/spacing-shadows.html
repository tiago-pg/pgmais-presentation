<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:22px;gap:14px;background:#f3f4f8">
  <div class="label">Elevation</div>
  <div class="row" style="gap:20px;align-items:center;justify-content:space-around">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:84px;height:54px;background:#fff;border-radius:10px;box-shadow:0 1px 2px rgba(23,44,102,.06)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">sm · card</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:84px;height:54px;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(23,44,102,.08),0 1px 3px rgba(23,44,102,.06)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">md · hover</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:84px;height:54px;background:#fff;border-radius:10px;box-shadow:0 16px 48px rgba(23,44,102,.12),0 4px 12px rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">lg · modal</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:84px;height:54px;background:#fff;border-radius:10px;box-shadow:0 32px 96px rgba(23,44,102,.16),0 8px 24px rgba(23,44,102,.10)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">xl · overlay</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:84px;height:54px;background:#fff;border-radius:10px;box-shadow:0 0 0 6px rgba(64,235,79,.18);border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">glow · green</div></div>
  </div>
</body></html>
