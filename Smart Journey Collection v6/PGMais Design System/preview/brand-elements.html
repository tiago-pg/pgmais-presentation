<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Brand elements</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px;gap:14px;background:#f3f4f8">
  <div class="row" style="gap:14px;align-items:stretch">
    <!-- Gradient blob on dark, so it reads -->
    <div style="flex:1.2;background:#172c66;border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:center;min-height:150px">
      <img src="../assets/elements/gradient.png" style="max-width:100%;max-height:140px">
    </div>
    <!-- Brasil map -->
    <div style="width:150px;background:#fff;border:1px solid rgba(23,44,102,.08);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:center">
      <img src="../assets/elements/brasil-map.png" style="max-width:100%;max-height:120px">
    </div>
    <!-- Square frame (outlined) on white so the thin gradient stroke is visible -->
    <div style="width:150px;background:#fff;border:1px solid rgba(23,44,102,.08);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:center">
      <img src="../assets/elements/frame-square.png" style="max-width:100%;max-height:120px">
    </div>
    <!-- Horizontal frame -->
    <div style="flex:1;background:#fff;border:1px solid rgba(23,44,102,.08);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:center">
      <img src="../assets/elements/frame-horizontal.png" style="max-width:100%;max-height:90px">
    </div>
  </div>
  <div class="small">Blob de degradê verde→azul vibrante (uso em heros) · Mapa do BR · Frames outline com stroke em degradê.</div>
</body></html>
