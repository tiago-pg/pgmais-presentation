<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Semantic colors</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px;gap:10px">
  <div class="grid" style="grid-template-columns:repeat(2,1fr);gap:10px">
    <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid rgba(23,44,102,.08)">
      <div style="width:34px;height:34px;border-radius:8px;background:#172c66"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">fg-default / bg-brand</div>
        <div class="mono" style="color:var(--fg-muted);font-size:10px">Navy · text & dark surfaces</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid rgba(23,44,102,.08)">
      <div style="width:34px;height:34px;border-radius:8px;background:#40eb4f"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">fg-accent / success</div>
        <div class="mono" style="color:var(--fg-muted);font-size:10px">Verde · CTAs & high-emph</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid rgba(23,44,102,.08)">
      <div style="width:34px;height:34px;border-radius:8px;background:#0120eb"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">fg-link / focus</div>
        <div class="mono" style="color:var(--fg-muted);font-size:10px">Blue · links & focus ring</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid rgba(23,44,102,.08)">
      <div style="width:34px;height:34px;border-radius:8px;background:#ededed;border:1px solid rgba(23,44,102,.08)"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">bg-page / fg-on-brand</div>
        <div class="mono" style="color:var(--fg-muted);font-size:10px">Gray · breathing & text on navy</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid rgba(23,44,102,.08)">
      <div style="width:34px;height:34px;border-radius:8px;background:#3db7f4"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">status-info</div>
        <div class="mono" style="color:var(--fg-muted);font-size:10px">Sky · informational</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:#fff;border:1px solid rgba(23,44,102,.08)">
      <div style="width:34px;height:34px;border-radius:8px;background:#f173ac"></div>
      <div>
        <div style="font-family:var(--font-primary);font-weight:700;font-size:12px">status-danger</div>
        <div class="mono" style="color:var(--fg-muted);font-size:10px">Rosa · critical / overdue</div>
      </div>
    </div>
  </div>
</body></html>
