<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px;gap:12px">
  <div class="label">Corner radii</div>
  <div class="row" style="gap:14px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:72px;height:72px;background:#ededed;border-radius:6px;border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">sm · 6</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:72px;height:72px;background:#ededed;border-radius:12px;border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">md · 12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:72px;height:72px;background:#ededed;border-radius:20px;border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">lg · 20</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:72px;height:72px;background:#ededed;border-radius:32px;border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">xl · 32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:72px;height:72px;background:#ededed;border-radius:48px;border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">2xl · 48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:72px;height:72px;background:#ededed;border-radius:9999px;border:1px solid rgba(23,44,102,.08)"></div><div class="mono" style="color:var(--fg-muted);font-size:10px">full</div></div>
  </div>
  <div class="small">Radii generosos — os frame SVGs da marca giram em torno de 5–7% da borda menor.</div>
</body></html>
