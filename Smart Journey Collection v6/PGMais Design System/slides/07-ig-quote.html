<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>PGMais · IG Quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#0a1230}
.slide{width:1280px;height:720px;background:#172c66;color:#ededed;position:relative;overflow:hidden;font-family:var(--font-primary)}
.stage{display:flex;align-items:center;justify-content:center;gap:90px;height:100%;padding:0 90px}
.card{position:relative;width:640px;height:320px;border-radius:28px;padding:44px 52px;display:flex;flex-direction:column;justify-content:center;background:#172c66}
.card::before{content:"";position:absolute;inset:0;border-radius:28px;padding:1.5px;background:linear-gradient(135deg,#40eb4f 0%,#0120eb 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.card h2{font-family:var(--font-primary);font-weight:700;font-size:72px;line-height:1;letter-spacing:-0.02em;margin:0;color:#ededed}
.card h2 .accent{color:#40eb4f}
.ig-icons{position:absolute;bottom:24px;right:30px;display:flex;gap:14px;color:rgba(237,237,237,.85)}
.ig-icons svg{width:22px;height:22px}
.brand{display:flex;align-items:center;gap:18px}
.brand .mark{font-family:var(--font-primary);font-weight:900;font-size:84px;line-height:1;color:#ededed;letter-spacing:-0.04em;display:flex;align-items:center;gap:4px}
.brand .mark .plus{display:inline-flex;width:56px;height:56px;border:2px solid #ededed;border-radius:50%;align-items:center;justify-content:center;margin-left:6px}
.brand .mark .plus::before{content:"";width:24px;height:2px;background:#ededed;position:absolute}
.brand .mark .plus::after{content:"";width:2px;height:24px;background:#ededed;position:absolute}
.brand .sub{font-family:var(--font-primary);font-weight:400;font-size:14px;color:rgba(237,237,237,.9);line-height:1.2}
</style></head>
<body><div class="slide" data-screen-label="IG Card Quote">
<div class="stage">
  <div class="card">
    <h2>tech,<br>but people<br>first.</h2>
    <div class="ig-icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 000-7.8z"/></svg>
    </div>
  </div>
  <div class="brand">
    <img src="../assets/logos/pgmais-horizontal-completa-dark.png" alt="pgmais — tech, but people first." style="width:240px;height:auto;display:block">
  </div>
</div>
</div></body></html>
