<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PGMais · Quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0a1230}
  .slide{width:1280px;height:720px;background:#172c66;color:#ededed;position:relative;overflow:hidden}
  .stage{position:relative;height:100%;padding:90px 120px;display:flex;flex-direction:column;justify-content:center}
  .mark{font-family:var(--font-primary);font-weight:900;font-size:180px;line-height:1;color:#40eb4f;position:absolute;top:60px;left:96px;opacity:.9}
  blockquote{margin:0;font-family:var(--font-primary);font-weight:700;font-size:56px;line-height:1.15;letter-spacing:-.02em;color:#ededed;max-width:940px}
  .highlight{color:#40eb4f}
  .attr{display:flex;align-items:center;gap:16px;margin-top:48px}
  .attr .avatar{width:56px;height:56px;border-radius:50%;background:#40eb4f;display:flex;align-items:center;justify-content:center;color:#172c66;font-family:var(--font-primary);font-weight:900;font-size:22px}
  .attr .meta{font-family:var(--font-secondary);font-size:14px;color:rgba(237,237,237,.85)}
  .attr .meta .name{font-weight:600;font-size:16px;color:#ededed}
  .foot{position:absolute;left:96px;right:96px;bottom:60px;display:flex;align-items:center;justify-content:space-between}
  .logo{height:22px}
  .page{font-family:var(--font-mono);font-size:12px;color:rgba(237,237,237,.55);letter-spacing:.1em}
</style></head>
<body>
<div class="slide" data-screen-label="04 Quote">
  <div class="stage">
    <div class="mark">“</div>
    <blockquote>Nossa proposta de valor reside na <span class="highlight">onipresença digital</span> e na precisão cirúrgica da jornada.</blockquote>
    <div class="attr">
      <div class="avatar">P</div>
      <div class="meta">
        <div class="name">PGMais · Manual do Novo Posicionamento</div>
        <div>Proposta de Valor · 2026</div>
      </div>
    </div>
  </div>
  <div class="foot">
    <img class="logo" src="../assets/logos/pgmais-horizontal-reduzida-dark.png" alt="PGMais">
    <div class="page">04 / 06</div>
  </div>
</div>
</body></html>
