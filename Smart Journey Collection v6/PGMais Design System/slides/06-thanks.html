<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PGMais · Obrigado</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0a1230}
  .slide{width:1280px;height:720px;background:#172c66;color:#ededed;position:relative;overflow:hidden}
  .stage{position:relative;height:100%;padding:90px 120px;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:center;justify-content:space-between}
  .logo{height:32px}
  .year{font-family:var(--font-primary);font-weight:500;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:rgba(237,237,237,.6)}
  .middle h1{font-family:var(--font-primary);font-weight:900;font-size:128px;line-height:.95;letter-spacing:-.03em;margin:0;color:#ededed}
  .middle h1 .accent{color:#40eb4f}
  .middle .sub{font-family:var(--font-secondary);font-size:20px;line-height:1.5;color:rgba(237,237,237,.78);margin-top:24px;max-width:620px}
  .contact{display:flex;align-items:flex-end;justify-content:space-between}
  .contact .col{font-family:var(--font-secondary);font-size:14px;line-height:1.7;color:rgba(237,237,237,.85)}
  .contact .col .lbl{display:block;font-family:var(--font-primary);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(237,237,237,.5);margin-bottom:6px}
  .contact .col a{color:#40eb4f;text-decoration:none}
  .tagline{font-family:var(--font-primary);font-weight:400;font-size:16px;color:rgba(237,237,237,.6)}
</style></head>
<body>
<div class="slide" data-screen-label="06 Thanks">
  <div class="stage">
    <div class="top">
      <img class="logo" src="../assets/logos/pgmais-horizontal-reduzida-dark.png" alt="PGMais">
      <div class="year">PGMais · 2026</div>
    </div>
    <div class="middle">
      <h1>Obrigado.<br><span class="accent">Vamos conversar?</span></h1>
      <div class="sub">Descubra como o ecossistema PGMais pode transformar a cobrança em vantagem competitiva.</div>
    </div>
    <div class="contact">
      <div class="col">
        <span class="lbl">Comercial</span>
        <a>comercial@pgmais.com.br</a><br>
        +55 (11) 0000-0000
      </div>
      <div class="col">
        <span class="lbl">Site</span>
        <a>pgmais.com.br</a><br>
        /oneCollect · /blog
      </div>
      <div class="tagline">tech, but people first.</div>
    </div>
  </div>
</div>
</body></html>
