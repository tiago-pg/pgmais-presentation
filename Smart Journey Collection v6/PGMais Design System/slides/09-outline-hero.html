<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>PGMais · Outline frames</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#0a1230}
.slide{width:1280px;height:720px;background:#172c66;color:#ededed;position:relative;overflow:hidden;font-family:var(--font-primary)}
.frame{position:absolute;border-radius:36px;pointer-events:none}
.frame::before{content:"";position:absolute;inset:0;border-radius:36px;padding:1.5px;background:linear-gradient(135deg,#40eb4f 0%,#0120eb 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.f1{left:-160px;top:-180px;width:780px;height:520px}
.f2{left:-60px;top:60px;width:540px;height:580px}
.f3{left:-240px;bottom:-240px;width:520px;height:480px}
.title-box{position:absolute;right:80px;top:50%;transform:translateY(-50%);width:560px;display:flex;align-items:center;justify-content:center}
.title-box h2{font-family:var(--font-primary);font-weight:900;font-size:56px;line-height:1.05;color:#ededed;text-align:center;margin:0;letter-spacing:-0.015em}
.plus{position:absolute;top:32px;right:32px;width:36px;height:36px}
.plus img{width:100%;height:100%;display:block}
</style></head>
<body><div class="slide" data-screen-label="Outline Frames Hero">
<div class="frame f1"></div>
<div class="frame f2"></div>
<div class="frame f3"></div>
<div class="title-box"><h2>Clique para adicionar<br>um título</h2></div>
<div class="plus"><img src="../assets/logos/pgmais-simbolo-dark.png" alt=""></div>
</div></body></html>
