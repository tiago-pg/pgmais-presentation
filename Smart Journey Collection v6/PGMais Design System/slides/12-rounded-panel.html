<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>PGMais · Rounded Panel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#0a1230}
.slide{width:1280px;height:720px;position:relative;overflow:hidden;font-family:var(--font-primary);background:#ededed;display:flex;align-items:center;padding:0;box-sizing:border-box}
.panel{width:54%;height:100%;background:#172c66;color:#ededed;border-top-right-radius:120px;border-bottom-right-radius:120px;padding:80px;display:flex;align-items:center;box-sizing:border-box}
.title-block{width:100%;display:flex;flex-direction:column;gap:16px}
/* Título: Lato Bold 700 */
.title-block h2{
  font-family:var(--font-primary);
  font-weight:700;
  font-size:49px;
  line-height:1.1;
  color:#ededed;
  margin:0;
  letter-spacing:-0.01em;
}
/* Legenda: Lato Regular 400 */
.title-block .legenda{
  font-family:var(--font-primary);
  font-weight:400;
  font-size:20px;
  line-height:1.4;
  color:rgba(237,237,237,.92);
}
.right{flex:1;padding:80px;display:flex;align-items:center}
.body-box{width:100%}
/* Body 1 · Lato 400 (scaled up for slide reading distance) */
.body-box p{
  font-family:var(--font-primary);
  font-weight:400;
  font-size:20px;
  line-height:1.5;
  color:#172c66;
  margin:0;
}
.plus{position:absolute;top:36px;right:48px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;z-index:3}
.plus img{width:100%;height:100%;display:block}
</style></head>
<body><div class="slide" data-screen-label="Rounded Navy Panel">
<div class="panel"><div class="title-block">
  <h2>Clique para adicionar<br>um título</h2>
  <div class="legenda">Clique para adicionar uma legenda</div>
</div></div>
<div class="right"><div class="body-box"><p>Clique para adicionar texto. Variante com painel navy arredondado — útil para destacar um tema sobre fundo claro.</p></div></div>
<div class="plus"><img src="../assets/logos/pgmais-simbolo-light.png" alt=""></div>
</div></body></html>
