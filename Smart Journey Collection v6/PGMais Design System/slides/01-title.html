<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PGMais · Slide Title</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#0a1230; }
  .slide { width:1280px; height:720px; background:#172c66; color:#ededed; position:relative; overflow:hidden; font-family:var(--font-primary); }
  .stage { position:relative; height:100%; padding: 64px 96px; display:flex; flex-direction:column; }
  .top { display:flex; align-items:center; justify-content:space-between; }
  .logo { height:38px; }
  .year { font-weight:500; font-size:14px; letter-spacing:0.16em; color:rgba(237,237,237,.6); text-transform:uppercase;}
  .center { margin-top:auto; margin-bottom:auto; max-width:960px;}
  .eyebrow { font-family:var(--font-primary); font-weight:500; font-size:14px; letter-spacing:0.22em; text-transform:uppercase; color:#40eb4f; margin-bottom:28px;}
  h1 { font-family:var(--font-primary); font-weight:900; font-size:64px; line-height:1; letter-spacing:-0.02em; color:#ededed; margin:0; max-width:880px;}
  .sub { font-family:var(--font-secondary); font-weight:400; font-size:20px; line-height:1.5; color:rgba(237,237,237,.78); margin-top:24px; max-width:680px;}
  .bottom { display:flex; align-items:flex-end; justify-content:space-between; margin-top:24px;}
  .tagline { font-family:var(--font-primary); font-weight:400; font-size:16px; color:rgba(237,237,237,.55); letter-spacing:0.01em; white-space:nowrap;}
  .page { font-family:var(--font-mono); font-size:12px; color:rgba(237,237,237,.55); letter-spacing:0.1em;}
  .accent-bar { position:absolute; left:0; top:50%; transform:translateY(-50%); width:6px; height:240px; background:linear-gradient(180deg,#40eb4f 0%, #0120eb 100%); border-radius:0 6px 6px 0;}
</style>
</head>
<body>
<div class="slide" data-screen-label="01 Title">
  <div class="accent-bar"></div>
  <div class="stage">
    <div class="top">
      <img class="logo" src="../assets/logos/pgmais-horizontal-reduzida-dark.png" alt="PGMais">
      <div class="year">PGMais · 2026</div>
    </div>
    <div class="center">
      <div class="eyebrow">Novo Posicionamento</div>
      <h1>Dados em sabedoria estratégica.</h1>
      <div class="sub">O mais completo ecossistema de relacionamento digital para cobrança do Brasil. Tecnologia proprietária, inteligência aplicada, experiência humana.</div>
    </div>
    <div class="bottom">
      <div class="tagline">tech, but people first.</div>
      <div class="page">01 / 06</div>
    </div>
  </div>
</div>
</body></html>
