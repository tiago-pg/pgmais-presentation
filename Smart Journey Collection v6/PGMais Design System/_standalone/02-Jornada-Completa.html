document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"201014d3-7cd5-4b37-91d0-46b15b7658d1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ===================================================================\n     COLORS — Core (4 cores fundamentais, per the positioning guide)\n     =================================================================== */\n  --color-navy:          #172c66;  /* Azul Escuro Profundo — primary bg & text on light */\n  --color-blue:          #0120eb;  /* Azul Vibrante — gradient partner, low-emph signals */\n  --color-green:         #40eb4f;  /* Verde — signature accent, high-emph elements, CTAs */\n  --color-gray-light:    #ededed;  /* Cinza Claro — text on navy, breathing-room fills */\n\n  /* ===================================================================\n     COLORS — Extended (secondary palette from the Cores spread)\n     =================================================================== */\n  --color-sky:           #3db7f4;  /* Azul Claro — info / data surfaces */\n  --color-yellow:        #f2f24b;  /* Amarelo — highlight / emphasis */\n  --color-pink:          #f173ac;  /* Rosa — human / empathy-coded surfaces */\n\n  /* ===================================================================\n     COLORS — Neutral scale (derived — not in guide, for UI use)\n     =================================================================== */\n  --color-white:         #ffffff;\n  --color-gray-50:       #f8f8f9;\n  --color-gray-100:      #ededed;  /* same as --color-gray-light */\n  --color-gray-200:      #e1e1e3;\n  --color-gray-300:      #c8c9cd;\n  --color-gray-400:      #9a9ca5;\n  --color-gray-500:      #6d7080;\n  --color-gray-600:      #4a4e5e;\n  --color-gray-700:      #32364a;\n  --color-gray-800:      #20243a;\n  --color-gray-900:      #172c66;  /* same as --color-navy */\n  --color-black:         #0b1230;  /* deeper than navy, for extreme contrast only */\n\n  /* ===================================================================\n     COLORS — Navy tints (derived, for hover/subtle-fill states)\n     =================================================================== */\n  --color-navy-95:       #1d3574;\n  --color-navy-90:       #243e82;\n  --color-navy-80:       #4a5d9a;\n  --color-navy-20:       #d1d5e0;\n  --color-navy-10:       #e8eaf0;\n  --color-navy-05:       #f3f4f8;\n\n  /* ===================================================================\n     COLORS — Green tints\n     =================================================================== */\n  --color-green-hover:   #30d93e;  /* -6% lightness for button hover */\n  --color-green-press:   #23c431;  /* -12% for press */\n  --color-green-20:      #caf6ce;\n  --color-green-10:      #e4fae6;\n\n  /* ===================================================================\n     SEMANTIC COLOR ROLES — use these in components, not raw palette names\n     =================================================================== */\n\n  /* Surfaces */\n  --bg-page:             var(--color-gray-light);  /* comfort fill per guide */\n  --bg-surface:          var(--color-white);\n  --bg-surface-raised:   var(--color-white);\n  --bg-brand:            var(--color-navy);        /* primary branded bg */\n  --bg-brand-soft:       var(--color-navy-05);\n  --bg-inverse:          var(--color-navy);\n\n  /* Foreground / text */\n  --fg-default:          var(--color-navy);        /* MANDATORY text color on light bg */\n  --fg-muted:            var(--color-gray-600);\n  --fg-subtle:           var(--color-gray-500);\n  --fg-on-brand:         var(--color-gray-light);  /* MANDATORY text color on navy bg */\n  --fg-on-brand-muted:   rgba(237, 237, 237, 0.72);\n  --fg-inverse:          var(--color-gray-light);\n  --fg-accent:           var(--color-green);\n  --fg-link:             var(--color-blue);\n\n  /* Borders */\n  --border-hairline:     rgba(23, 44, 102, 0.08);\n  --border-default:      rgba(23, 44, 102, 0.12);\n  --border-strong:       rgba(23, 44, 102, 0.24);\n  --border-on-brand:     rgba(237, 237, 237, 0.12);\n  --border-accent:       var(--color-green);\n  --border-focus:        var(--color-blue);\n\n  /* Status (derived from extended palette) */\n  --status-success:      var(--color-green);\n  --status-info:         var(--color-sky);\n  --status-warning:      var(--color-yellow);\n  --status-danger:       var(--color-pink);\n\n  /* ===================================================================\n     GRADIENTS — Brand signature\n     =================================================================== */\n  --gradient-brand:      linear-gradient(90deg, var(--color-green) 0%, var(--color-blue) 100%);\n  --gradient-brand-diag: linear-gradient(135deg, var(--color-green) 0%, var(--color-blue) 100%);\n  --gradient-hero:       radial-gradient(60% 80% at 20% 30%, rgba(64,235,79,0.35) 0%, transparent 60%),\n                         radial-gradient(60% 80% at 80% 70%, rgba(1,32,235,0.30) 0%, transparent 60%);\n  --gradient-navy-fade:  linear-gradient(180deg, var(--color-navy) 0%, #0f1e47 100%);\n\n  /* ===================================================================\n     TYPOGRAPHY — Families\n     =================================================================== */\n  --font-primary:        'Lato', 'Helvetica Neue', Arial, sans-serif;\n  --font-secondary:      'Poppins', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:           ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', monospace;\n\n  /* ===================================================================\n     TYPOGRAPHY — Weights (canonical set per guide)\n     =================================================================== */\n  --fw-light:    300;\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-bold:     700;\n  --fw-black:    900;\n\n  /* ===================================================================\n     TYPOGRAPHY — Type scale (semantic roles)\n     Size / line-height / letter-spacing tokens. Family+weight on the role.\n     =================================================================== */\n  --text-display-size:    72px;  --text-display-lh:    1.05;  --text-display-ls: -0.02em;\n  --text-h1-size:         56px;  --text-h1-lh:         1.10;  --text-h1-ls:      -0.02em;\n  --text-h2-size:         40px;  --text-h2-lh:         1.15;  --text-h2-ls:      -0.01em;\n  --text-h3-size:         28px;  --text-h3-lh:         1.20;  --text-h3-ls:      -0.005em;\n  --text-h4-size:         22px;  --text-h4-lh:         1.30;  --text-h4-ls:      0;\n  --text-subtitle-size:   20px;  --text-subtitle-lh:   1.40;  --text-subtitle-ls: 0;\n  --text-body-size:       16px;  --text-body-lh:       1.60;  --text-body-ls:    0;\n  --text-body-sm-size:    14px;  --text-body-sm-lh:    1.55;  --text-body-sm-ls: 0;\n  --text-caption-size:    12px;  --text-caption-lh:    1.50;  --text-caption-ls: 0;\n  --text-eyebrow-size:    12px;  --text-eyebrow-lh:    1.40;  --text-eyebrow-ls: 0.12em;\n  --text-cta-size:        16px;  --text-cta-lh:        1.00;  --text-cta-ls:     0.01em;\n\n  /* ===================================================================\n     SPACING — 4/8 px base unit\n     =================================================================== */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ===================================================================\n     RADII\n     =================================================================== */\n  --radius-none: 0;\n  --radius-sm:   6px;\n  --radius-md:   12px;\n  --radius-lg:   20px;\n  --radius-xl:   32px;\n  --radius-2xl:  48px;\n  --radius-full: 9999px;\n\n  /* ===================================================================\n     SHADOWS\n     =================================================================== */\n  --shadow-none:       none;\n  --shadow-sm:         0 1px 2px rgba(23,44,102,0.06);\n  --shadow-md:         0 4px 16px rgba(23,44,102,0.08), 0 1px 3px rgba(23,44,102,0.06);\n  --shadow-lg:         0 16px 48px rgba(23,44,102,0.12), 0 4px 12px rgba(23,44,102,0.08);\n  --shadow-xl:         0 32px 96px rgba(23,44,102,0.16), 0 8px 24px rgba(23,44,102,0.10);\n  --shadow-focus:      0 0 0 3px rgba(1,32,235,0.25);\n  --shadow-glow-green: 0 0 0 6px rgba(64,235,79,0.18);\n\n  /* ===================================================================\n     MOTION\n     =================================================================== */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);\n  --ease-in:       cubic-bezier(0.55, 0.06, 0.68, 0.19);\n  --ease-out:      cubic-bezier(0.22, 0.61, 0.36, 1);\n  --duration-fast: 150ms;\n  --duration-mid:  240ms;\n  --duration-slow: 400ms;\n\n  /* ===================================================================\n     LAYOUT\n     =================================================================== */\n  --container-sm:  640px;\n  --container-md:  960px;\n  --container-lg:  1280px;\n  --container-xl:  1440px;\n  --nav-h:         72px;\n  --focus-ring-w:  2px;\n\n  /* ===================================================================\n     FOUNDATION — Color ramps (per Figma \"Cores - uso interno\")\n     13 ramps × 10 stops. Use these for product UI; the Core/Extended\n     palette above stays for brand surfaces.\n     =================================================================== */\n\n  /* primary-blue */\n  --primary-blue-50:   #E7EBFD;  --primary-blue-100:  #C2CDF9;\n  --primary-blue-200:  #9AACF5;  --primary-blue-300:  #728BF1;\n  --primary-blue-400:  #5372EE;  --primary-blue-500:  #3559EB;\n  --primary-blue-600:  #3051E9;  --primary-blue-700:  #2848E5;\n  --primary-blue-800:  #223EE2;  --primary-blue-900:  #162EDD;\n\n  /* secondary-blue (sky) */\n  --secondary-blue-50:  #E8F6FE;  --secondary-blue-100: #C5E9FC;\n  --secondary-blue-200: #9EDBFA;  --secondary-blue-300: #77CDF7;\n  --secondary-blue-400: #5AC2F6;  --secondary-blue-500: #3DB7F4;\n  --secondary-blue-600: #37B0F3;  --secondary-blue-700: #2FA7F1;\n  --secondary-blue-800: #279FEF;  --secondary-blue-900: #1A90EC;\n\n  /* tertiary-blue (navy) */\n  --tertiary-blue-50:  #E5E7F0;  --tertiary-blue-100: #BDC4DA;\n  --tertiary-blue-200: #929DC1;  --tertiary-blue-300: #6675A8;\n  --tertiary-blue-400: #455896;  --tertiary-blue-500: #243A83;\n  --tertiary-blue-600: #20347B;  --tertiary-blue-700: #1B2C70;\n  --tertiary-blue-800: #162566;  --tertiary-blue-900: #0D1853;\n\n  /* brand-email (cyan-bright) */\n  --brand-email-50:  #E4FBFD;  --brand-email-100: #BCF5FB;\n  --brand-email-200: #90EFF8;  --brand-email-300: #63E9F5;\n  --brand-email-400: #41E4F3;  --brand-email-500: #20DFF1;\n  --brand-email-600: #1CDBEF;  --brand-email-700: #18D7ED;\n  --brand-email-800: #13D2EB;  --brand-email-900: #0BCAE7;\n\n  /* secondary-pink */\n  --secondary-pink-50:  #FFEEF7;  --secondary-pink-100: #FFD4EB;\n  --secondary-pink-200: #FFB8DE;  --secondary-pink-300: #FE9BD1;\n  --secondary-pink-400: #FE85C7;  --secondary-pink-500: #FE70BD;\n  --secondary-pink-600: #FE68B7;  --secondary-pink-700: #FE5DAE;\n  --secondary-pink-800: #FE53A6;  --secondary-pink-900: #FD4198;\n\n  /* cyan (teal) */\n  --cyan-50:  #E2FAF9;  --cyan-100: #B6F4F0;\n  --cyan-200: #85ECE7;  --cyan-300: #54E4DD;\n  --cyan-400: #30DFD5;  --cyan-500: #0BD9CE;\n  --cyan-600: #0AD5C9;  --cyan-700: #08CFC2;\n  --cyan-800: #06CABC;  --cyan-900: #03C0B0;\n\n  /* green (lime) */\n  --green-50:  #F3FAE0;  --green-100: #E2F2B3;\n  --green-200: #CEE980;  --green-300: #BAE04D;\n  --green-400: #ACD926;  --green-500: #9DD200;\n  --green-600: #95CD00;  --green-700: #8BC700;\n  --green-800: #81C100;  --green-900: #5D930A;\n\n  /* purple */\n  --purple-50:  #F2E8FF;  --purple-100: #DFC6FF;\n  --purple-200: #C9A0FF;  --purple-300: #B379FF;\n  --purple-400: #A35DFF;  --purple-500: #9340FF;\n  --purple-600: #8B3AFF;  --purple-700: #8032FF;\n  --purple-800: #7325FF;  --purple-900: #641CFF;\n\n  /* coral */\n  --coral-50:  #FCEDEE;  --coral-100: #F9D3D5;\n  --coral-200: #F5B5B9;  --coral-300: #F0979C;\n  --coral-400: #ED8187;  --coral-500: #EA6B72;\n  --coral-600: #E7636A;  --coral-700: #E4585F;\n  --coral-800: #E14E55;  --coral-900: #DB3C42;\n\n  /* orange */\n  --orange-50:  #FEEFE1;  --orange-100: #FCD7B3;\n  --orange-200: #FABC80;  --orange-300: #F7A14D;\n  --orange-400: #F68D27;  --orange-500: #F47901;\n  --orange-600: #F37101;  --orange-700: #F16601;\n  --orange-800: #EF5C01;  --orange-900: #DB4604;\n\n  /* success */\n  --success-50:  #E8FDEA;  --success-100: #C6F9CA;\n  --success-200: #A0F5A7;  --success-300: #79F184;\n  --success-400: #5DEE69;  --success-500: #40EB4F;\n  --success-600: #3AE948;  --success-700: #32E53F;\n  --success-800: #2AE236;  --success-900: #1CDD26;\n\n  /* warning */\n  --warning-50:  #FFF7E0;  --warning-100: #FFECB3;\n  --warning-200: #FFDF80;  --warning-300: #FFD24D;\n  --warning-400: #FFC826;  --warning-500: #FFBE00;\n  --warning-600: #FFB800;  --warning-700: #FFAF00;\n  --warning-800: #FFA700;  --warning-900: #FF9900;\n\n  /* error */\n  --error-50:  #FEE6E0;  --error-100: #FCC0B3;\n  --error-200: #FA9680;  --error-300: #F86C4D;\n  --error-400: #F74D26;  --error-500: #F52D00;\n  --error-600: #F42800;  --error-700: #F22200;\n  --error-800: #F01C00;  --error-900: #EE1100;\n\n  /* gray scale (10 stops, gray-0 = white) */\n  --gray-0:   #FFFFFF;  --gray-10:  #F5F7F8;  --gray-30:  #EFF0F2;\n  --gray-50:  #E1E1E4;  --gray-100: #CBD0D6;  --gray-200: #B5BCC4;\n  --gray-300: #9EA7B1;  --gray-400: #8A929B;  --gray-500: #7C818A;\n  --gray-600: #6B717C;  --gray-700: #555A64;  --gray-800: #3A4148;\n  --gray-900: #1D1F27;\n\n  /* brand product hexes */\n  --brand-sms-500: #00B6F5;\n  --brand-rcs-500: #0064E4;\n  --info-500:      #0045F5;\n\n  /* ===================================================================\n     FOUNDATION — Typography scale (Figma: Base 16, Scale 1.25)\n     =================================================================== */\n  --foundation-base:        16px;\n  --foundation-headline-1:  61px;  /* 3.812rem */\n  --foundation-headline-2:  49px;  /* 3.062rem */\n  --foundation-headline-3:  39px;  /* 2.438rem */\n  --foundation-headline-4:  31px;  /* 1.938rem */\n  --foundation-subtitle-1:  25px;  /* 1.562rem */\n  --foundation-subtitle-2:  20px;  /* 1.250rem */\n  --foundation-subtitle-3:  16px;  /* 1.000rem */\n  --foundation-body-1:      16px;  /* 1.000rem */\n  --foundation-body-2:      13px;  /* 0.812rem */\n  --foundation-caption:     10px;  /* 0.625rem */\n  --foundation-line-height: 120%;\n\n  /* ===================================================================\n     FOUNDATION — Elevation (8 levels)\n     =================================================================== */\n  --elevation-0: none;\n  --elevation-1: 0 1px 2px rgba(29,31,39,0.06);\n  --elevation-2: 0 2px 4px rgba(29,31,39,0.08), 0 1px 2px rgba(29,31,39,0.04);\n  --elevation-3: 0 4px 8px rgba(29,31,39,0.10), 0 2px 4px rgba(29,31,39,0.06);\n  --elevation-4: 0 8px 16px rgba(29,31,39,0.12), 0 2px 6px rgba(29,31,39,0.06);\n  --elevation-5: 0 12px 24px rgba(29,31,39,0.14), 0 4px 8px rgba(29,31,39,0.08);\n  --elevation-6: 0 16px 32px rgba(29,31,39,0.16), 0 6px 12px rgba(29,31,39,0.10);\n  --elevation-7: 0 24px 48px rgba(29,31,39,0.20), 0 10px 20px rgba(29,31,39,0.12);\n\n  /* ===================================================================\n     FOUNDATION — Spacing (8-point grid extension)\n     =================================================================== */\n  --space-fnd-4:  4px;   --space-fnd-8:  8px;   --space-fnd-12: 12px;\n  --space-fnd-16: 16px;  --space-fnd-20: 20px;  --space-fnd-24: 24px;\n  --space-fnd-32: 32px;  --space-fnd-40: 40px;  --space-fnd-48: 48px;\n  --space-fnd-56: 56px;  --space-fnd-64: 64px;  --space-fnd-72: 72px;\n  --space-fnd-80: 80px;\n\n  /* ===================================================================\n     FOUNDATION — Breakpoints\n     =================================================================== */\n  --bp-xs:  600px;   /* < 600  Extra Small Phone */\n  --bp-sm:  940px;   /* 600–940 Small Tablet */\n  --bp-md:  1264px;  /* 940–1264 Medium Laptop / Tablet */\n  --bp-lg:  1904px;  /* 1264–1904 Desktop Large */\n  /* > 1904 Full HD 4k */\n}\n\n/* =========================================================================\n   SEMANTIC TYPE CLASSES\n   Apply these to elements so that changing the role changes the look.\n   ========================================================================= */\n\n.t-display {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-black);\n  font-size: var(--text-display-size);\n  line-height: var(--text-display-lh);\n  letter-spacing: var(--text-display-ls);\n  color: var(--fg-default);\n}\n.t-h1 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-bold);\n  font-size: var(--text-h1-size);\n  line-height: var(--text-h1-lh);\n  letter-spacing: var(--text-h1-ls);\n  color: var(--fg-default);\n}\n.t-h2 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-bold);\n  font-size: var(--text-h2-size);\n  line-height: var(--text-h2-lh);\n  letter-spacing: var(--text-h2-ls);\n  color: var(--fg-default);\n}\n.t-h3 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-h3-size);\n  line-height: var(--text-h3-lh);\n  letter-spacing: var(--text-h3-ls);\n  color: var(--fg-default);\n}\n.t-h4 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-h4-size);\n  line-height: var(--text-h4-lh);\n  color: var(--fg-default);\n}\n.t-subtitle {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-subtitle-size);\n  line-height: var(--text-subtitle-lh);\n  color: var(--fg-muted);\n}\n.t-body {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-body-size);\n  line-height: var(--text-body-lh);\n  color: var(--fg-default);\n}\n.t-body-sm {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-body-sm-size);\n  line-height: var(--text-body-sm-lh);\n  color: var(--fg-muted);\n}\n.t-caption {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-caption-size);\n  line-height: var(--text-caption-lh);\n  color: var(--fg-muted);\n}\n.t-eyebrow {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-eyebrow-size);\n  line-height: var(--text-eyebrow-lh);\n  letter-spacing: var(--text-eyebrow-ls);\n  text-transform: uppercase;\n  color: var(--fg-muted);\n}\n.t-cta {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-bold);\n  font-size: var(--text-cta-size);\n  line-height: var(--text-cta-lh);\n  letter-spacing: var(--text-cta-ls);\n}\n\n/* =========================================================================\n   BASE ELEMENT STYLES — apply defaults so unclassed HTML still looks right\n   ========================================================================= */\n\nhtml {\n  box-sizing: border-box;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n*, *::before, *::after { box-sizing: inherit; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-secondary);\n  font-size: var(--text-body-size);\n  line-height: var(--text-body-lh);\n  color: var(--fg-default);\n  background: var(--bg-page);\n}\n\nh1 { font: var(--fw-bold) var(--text-h1-size)/var(--text-h1-lh) var(--font-primary); letter-spacing: var(--text-h1-ls); margin: 0; }\nh2 { font: var(--fw-bold) var(--text-h2-size)/var(--text-h2-lh) var(--font-primary); letter-spacing: var(--text-h2-ls); margin: 0; }\nh3 { font: var(--fw-medium) var(--text-h3-size)/var(--text-h3-lh) var(--font-primary); letter-spacing: var(--text-h3-ls); margin: 0; }\nh4 { font: var(--fw-medium) var(--text-h4-size)/var(--text-h4-lh) var(--font-primary); margin: 0; }\np  { margin: 0 0 var(--space-4) 0; text-wrap: pretty; }\n\na {\n  color: var(--fg-link);\n  text-decoration: none;\n  transition: color var(--duration-fast) var(--ease-standard);\n}\na:hover { text-decoration: underline; }\na:focus-visible {\n  outline: var(--focus-ring-w) solid var(--border-focus);\n  outline-offset: 2px;\n  border-radius: var(--radius-sm);\n}\n\n/* =========================================================================\n   UTILITY: dark surface — apply to any section to invert text handling\n   ========================================================================= */\n.on-brand {\n  background: var(--bg-brand);\n  color: var(--fg-on-brand);\n}\n.on-brand h1, .on-brand h2, .on-brand h3, .on-brand h4,\n.on-brand .t-display, .on-brand .t-h1, .on-brand .t-h2, .on-brand .t-h3, .on-brand .t-h4 {\n  color: var(--fg-on-brand);\n}\n.on-brand .t-subtitle, .on-brand .t-body-sm, .on-brand .t-caption, .on-brand .t-eyebrow {\n  color: var(--fg-on-brand-muted);\n}\n.on-brand a { color: var(--color-green); }\n<\u002Fstyle>\n<style>/* =========================================================================\n   PGMais · Social Media Templates — Shared chrome\n   Instagram Feed Retrato 1080×1350\n   ========================================================================= */\n/* =========================================================================\n   PGMais Design System — colors_and_type.css\n   Single source of truth for all design tokens.\n   Based on: Cópia de Novo Posicionamento_Brand Guide_Mini.pdf (2026)\n            + Template Institucional PGMais.\n   ============================================================ =================================================== */\n  --color-navy:          #172c66;  /* Azul Escuro Profundo — primary bg & text on light */\n  --color-blue:          #0120eb;  /* Azul Vibrante — gradient partner, low-emph signals */\n  --color-green:         #40eb4f;  /* Verde — signature accent, high-emph elements, CTAs */\n  --color-gray-light:    #ededed;  /* Cinza Claro — text on navy, breathing-room fills */\n\n  /* ===================================================================\n     COLORS — Extended (secondary palette from the Cores spread)\n     =================================================================== */\n  --color-sky:           #3db7f4;  /* Azul Claro — info / data surfaces */\n  --color-yellow:        #f2f24b;  /* Amarelo — highlight / emphasis */\n  --color-pink:          #f173ac;  /* Rosa — human / empathy-coded surfaces */\n\n  /* ===================================================================\n     COLORS — Neutral scale (derived — not in guide, for UI use)\n     =================================================================== */\n  --color-white:         #ffffff;\n  --color-gray-50:       #f8f8f9;\n  --color-gray-100:      #ededed;  /* same as --color-gray-light */\n  --color-gray-200:      #e1e1e3;\n  --color-gray-300:      #c8c9cd;\n  --color-gray-400:      #9a9ca5;\n  --color-gray-500:      #6d7080;\n  --color-gray-600:      #4a4e5e;\n  --color-gray-700:      #32364a;\n  --color-gray-800:      #20243a;\n  --color-gray-900:      #172c66;  /* same as --color-navy */\n  --color-black:         #0b1230;  /* deeper than navy, for extreme contrast only */\n\n  /* ===================================================================\n     COLORS — Navy tints (derived, for hover/subtle-fill states)\n     =================================================================== */\n  --color-navy-95:       #1d3574;\n  --color-navy-90:       #243e82;\n  --color-navy-80:       #4a5d9a;\n  --color-navy-20:       #d1d5e0;\n  --color-navy-10:       #e8eaf0;\n  --color-navy-05:       #f3f4f8;\n\n  /* ===================================================================\n     COLORS — Green tints\n     =================================================================== */\n  --color-green-hover:   #30d93e;  /* -6% lightness for button hover */\n  --color-green-press:   #23c431;  /* -12% for press */\n  --color-green-20:      #caf6ce;\n  --color-green-10:      #e4fae6;\n\n  /* ===================================================================\n     SEMANTIC COLOR ROLES — use these in components, not raw palette names\n     =================================================================== */\n\n  /* Surfaces */\n  --bg-page:             var(--color-gray-light);  /* comfort fill per guide */\n  --bg-surface:          var(--color-white);\n  --bg-surface-raised:   var(--color-white);\n  --bg-brand:            var(--color-navy);        /* primary branded bg */\n  --bg-brand-soft:       var(--color-navy-05);\n  --bg-inverse:          var(--color-navy);\n\n  /* Foreground / text */\n  --fg-default:          var(--color-navy);        /* MANDATORY text color on light bg */\n  --fg-muted:            var(--color-gray-600);\n  --fg-subtle:           var(--color-gray-500);\n  --fg-on-brand:         var(--color-gray-light);  /* MANDATORY text color on navy bg */\n  --fg-on-brand-muted:   rgba(237, 237, 237, 0.72);\n  --fg-inverse:          var(--color-gray-light);\n  --fg-accent:           var(--color-green);\n  --fg-link:             var(--color-blue);\n\n  /* Borders */\n  --border-hairline:     rgba(23, 44, 102, 0.08);\n  --border-default:      rgba(23, 44, 102, 0.12);\n  --border-strong:       rgba(23, 44, 102, 0.24);\n  --border-on-brand:     rgba(237, 237, 237, 0.12);\n  --border-accent:       var(--color-green);\n  --border-focus:        var(--color-blue);\n\n  /* Status (derived from extended palette) */\n  --status-success:      var(--color-green);\n  --status-info:         var(--color-sky);\n  --status-warning:      var(--color-yellow);\n  --status-danger:       var(--color-pink);\n\n  /* ===================================================================\n     GRADIENTS — Brand signature\n     =================================================================== */\n  --gradient-brand:      linear-gradient(90deg, var(--color-green) 0%, var(--color-blue) 100%);\n  --gradient-brand-diag: linear-gradient(135deg, var(--color-green) 0%, var(--color-blue) 100%);\n  --gradient-hero:       radial-gradient(60% 80% at 20% 30%, rgba(64,235,79,0.35) 0%, transparent 60%),\n                         radial-gradient(60% 80% at 80% 70%, rgba(1,32,235,0.30) 0%, transparent 60%);\n  --gradient-navy-fade:  linear-gradient(180deg, var(--color-navy) 0%, #0f1e47 100%);\n\n  /* ===================================================================\n     TYPOGRAPHY — Families\n     =================================================================== */\n  --font-primary:        'Lato', 'Helvetica Neue', Arial, sans-serif;\n  --font-secondary:      'Poppins', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:           ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', monospace;\n\n  /* ===================================================================\n     TYPOGRAPHY — Weights (canonical set per guide)\n     =================================================================== */\n  --fw-light:    300;\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-bold:     700;\n  --fw-black:    900;\n\n  /* ===================================================================\n     TYPOGRAPHY — Type scale (semantic roles)\n     Size / line-height / letter-spacing tokens. Family+weight on the role.\n     =================================================================== */\n  --text-display-size:    72px;  --text-display-lh:    1.05;  --text-display-ls: -0.02em;\n  --text-h1-size:         56px;  --text-h1-lh:         1.10;  --text-h1-ls:      -0.02em;\n  --text-h2-size:         40px;  --text-h2-lh:         1.15;  --text-h2-ls:      -0.01em;\n  --text-h3-size:         28px;  --text-h3-lh:         1.20;  --text-h3-ls:      -0.005em;\n  --text-h4-size:         22px;  --text-h4-lh:         1.30;  --text-h4-ls:      0;\n  --text-subtitle-size:   20px;  --text-subtitle-lh:   1.40;  --text-subtitle-ls: 0;\n  --text-body-size:       16px;  --text-body-lh:       1.60;  --text-body-ls:    0;\n  --text-body-sm-size:    14px;  --text-body-sm-lh:    1.55;  --text-body-sm-ls: 0;\n  --text-caption-size:    12px;  --text-caption-lh:    1.50;  --text-caption-ls: 0;\n  --text-eyebrow-size:    12px;  --text-eyebrow-lh:    1.40;  --text-eyebrow-ls: 0.12em;\n  --text-cta-size:        16px;  --text-cta-lh:        1.00;  --text-cta-ls:     0.01em;\n\n  /* ===================================================================\n     SPACING — 4/8 px base unit\n     =================================================================== */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ===================================================================\n     RADII\n     =================================================================== */\n  --radius-none: 0;\n  --radius-sm:   6px;\n  --radius-md:   12px;\n  --radius-lg:   20px;\n  --radius-xl:   32px;\n  --radius-2xl:  48px;\n  --radius-full: 9999px;\n\n  /* ===================================================================\n     SHADOWS\n     =================================================================== */\n  --shadow-none:       none;\n  --shadow-sm:         0 1px 2px rgba(23,44,102,0.06);\n  --shadow-md:         0 4px 16px rgba(23,44,102,0.08), 0 1px 3px rgba(23,44,102,0.06);\n  --shadow-lg:         0 16px 48px rgba(23,44,102,0.12), 0 4px 12px rgba(23,44,102,0.08);\n  --shadow-xl:         0 32px 96px rgba(23,44,102,0.16), 0 8px 24px rgba(23,44,102,0.10);\n  --shadow-focus:      0 0 0 3px rgba(1,32,235,0.25);\n  --shadow-glow-green: 0 0 0 6px rgba(64,235,79,0.18);\n\n  /* ===================================================================\n     MOTION\n     =================================================================== */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1);\n  --ease-in:       cubic-bezier(0.55, 0.06, 0.68, 0.19);\n  --ease-out:      cubic-bezier(0.22, 0.61, 0.36, 1);\n  --duration-fast: 150ms;\n  --duration-mid:  240ms;\n  --duration-slow: 400ms;\n\n  /* ===================================================================\n     LAYOUT\n     =================================================================== */\n  --container-sm:  640px;\n  --container-md:  960px;\n  --container-lg:  1280px;\n  --container-xl:  1440px;\n  --nav-h:         72px;\n  --focus-ring-w:  2px;\n\n  /* ===================================================================\n     FOUNDATION — Color ramps (per Figma \"Cores - uso interno\")\n     13 ramps × 10 stops. Use these for product UI; the Core/Extended\n     palette above stays for brand surfaces.\n     =================================================================== */\n\n  /* primary-blue */\n  --primary-blue-50:   #E7EBFD;  --primary-blue-100:  #C2CDF9;\n  --primary-blue-200:  #9AACF5;  --primary-blue-300:  #728BF1;\n  --primary-blue-400:  #5372EE;  --primary-blue-500:  #3559EB;\n  --primary-blue-600:  #3051E9;  --primary-blue-700:  #2848E5;\n  --primary-blue-800:  #223EE2;  --primary-blue-900:  #162EDD;\n\n  /* secondary-blue (sky) */\n  --secondary-blue-50:  #E8F6FE;  --secondary-blue-100: #C5E9FC;\n  --secondary-blue-200: #9EDBFA;  --secondary-blue-300: #77CDF7;\n  --secondary-blue-400: #5AC2F6;  --secondary-blue-500: #3DB7F4;\n  --secondary-blue-600: #37B0F3;  --secondary-blue-700: #2FA7F1;\n  --secondary-blue-800: #279FEF;  --secondary-blue-900: #1A90EC;\n\n  /* tertiary-blue (navy) */\n  --tertiary-blue-50:  #E5E7F0;  --tertiary-blue-100: #BDC4DA;\n  --tertiary-blue-200: #929DC1;  --tertiary-blue-300: #6675A8;\n  --tertiary-blue-400: #455896;  --tertiary-blue-500: #243A83;\n  --tertiary-blue-600: #20347B;  --tertiary-blue-700: #1B2C70;\n  --tertiary-blue-800: #162566;  --tertiary-blue-900: #0D1853;\n\n  /* brand-email (cyan-bright) */\n  --brand-email-50:  #E4FBFD;  --brand-email-100: #BCF5FB;\n  --brand-email-200: #90EFF8;  --brand-email-300: #63E9F5;\n  --brand-email-400: #41E4F3;  --brand-email-500: #20DFF1;\n  --brand-email-600: #1CDBEF;  --brand-email-700: #18D7ED;\n  --brand-email-800: #13D2EB;  --brand-email-900: #0BCAE7;\n\n  /* secondary-pink */\n  --secondary-pink-50:  #FFEEF7;  --secondary-pink-100: #FFD4EB;\n  --secondary-pink-200: #FFB8DE;  --secondary-pink-300: #FE9BD1;\n  --secondary-pink-400: #FE85C7;  --secondary-pink-500: #FE70BD;\n  --secondary-pink-600: #FE68B7;  --secondary-pink-700: #FE5DAE;\n  --secondary-pink-800: #FE53A6;  --secondary-pink-900: #FD4198;\n\n  /* cyan (teal) */\n  --cyan-50:  #E2FAF9;  --cyan-100: #B6F4F0;\n  --cyan-200: #85ECE7;  --cyan-300: #54E4DD;\n  --cyan-400: #30DFD5;  --cyan-500: #0BD9CE;\n  --cyan-600: #0AD5C9;  --cyan-700: #08CFC2;\n  --cyan-800: #06CABC;  --cyan-900: #03C0B0;\n\n  /* green (lime) */\n  --green-50:  #F3FAE0;  --green-100: #E2F2B3;\n  --green-200: #CEE980;  --green-300: #BAE04D;\n  --green-400: #ACD926;  --green-500: #9DD200;\n  --green-600: #95CD00;  --green-700: #8BC700;\n  --green-800: #81C100;  --green-900: #5D930A;\n\n  /* purple */\n  --purple-50:  #F2E8FF;  --purple-100: #DFC6FF;\n  --purple-200: #C9A0FF;  --purple-300: #B379FF;\n  --purple-400: #A35DFF;  --purple-500: #9340FF;\n  --purple-600: #8B3AFF;  --purple-700: #8032FF;\n  --purple-800: #7325FF;  --purple-900: #641CFF;\n\n  /* coral */\n  --coral-50:  #FCEDEE;  --coral-100: #F9D3D5;\n  --coral-200: #F5B5B9;  --coral-300: #F0979C;\n  --coral-400: #ED8187;  --coral-500: #EA6B72;\n  --coral-600: #E7636A;  --coral-700: #E4585F;\n  --coral-800: #E14E55;  --coral-900: #DB3C42;\n\n  /* orange */\n  --orange-50:  #FEEFE1;  --orange-100: #FCD7B3;\n  --orange-200: #FABC80;  --orange-300: #F7A14D;\n  --orange-400: #F68D27;  --orange-500: #F47901;\n  --orange-600: #F37101;  --orange-700: #F16601;\n  --orange-800: #EF5C01;  --orange-900: #DB4604;\n\n  /* success */\n  --success-50:  #E8FDEA;  --success-100: #C6F9CA;\n  --success-200: #A0F5A7;  --success-300: #79F184;\n  --success-400: #5DEE69;  --success-500: #40EB4F;\n  --success-600: #3AE948;  --success-700: #32E53F;\n  --success-800: #2AE236;  --success-900: #1CDD26;\n\n  /* warning */\n  --warning-50:  #FFF7E0;  --warning-100: #FFECB3;\n  --warning-200: #FFDF80;  --warning-300: #FFD24D;\n  --warning-400: #FFC826;  --warning-500: #FFBE00;\n  --warning-600: #FFB800;  --warning-700: #FFAF00;\n  --warning-800: #FFA700;  --warning-900: #FF9900;\n\n  /* error */\n  --error-50:  #FEE6E0;  --error-100: #FCC0B3;\n  --error-200: #FA9680;  --error-300: #F86C4D;\n  --error-400: #F74D26;  --error-500: #F52D00;\n  --error-600: #F42800;  --error-700: #F22200;\n  --error-800: #F01C00;  --error-900: #EE1100;\n\n  /* gray scale (10 stops, gray-0 = white) */\n  --gray-0:   #FFFFFF;  --gray-10:  #F5F7F8;  --gray-30:  #EFF0F2;\n  --gray-50:  #E1E1E4;  --gray-100: #CBD0D6;  --gray-200: #B5BCC4;\n  --gray-300: #9EA7B1;  --gray-400: #8A929B;  --gray-500: #7C818A;\n  --gray-600: #6B717C;  --gray-700: #555A64;  --gray-800: #3A4148;\n  --gray-900: #1D1F27;\n\n  /* brand product hexes */\n  --brand-sms-500: #00B6F5;\n  --brand-rcs-500: #0064E4;\n  --info-500:      #0045F5;\n\n  /* ===================================================================\n     FOUNDATION — Typography scale (Figma: Base 16, Scale 1.25)\n     =================================================================== */\n  --foundation-base:        16px;\n  --foundation-headline-1:  61px;  /* 3.812rem */\n  --foundation-headline-2:  49px;  /* 3.062rem */\n  --foundation-headline-3:  39px;  /* 2.438rem */\n  --foundation-headline-4:  31px;  /* 1.938rem */\n  --foundation-subtitle-1:  25px;  /* 1.562rem */\n  --foundation-subtitle-2:  20px;  /* 1.250rem */\n  --foundation-subtitle-3:  16px;  /* 1.000rem */\n  --foundation-body-1:      16px;  /* 1.000rem */\n  --foundation-body-2:      13px;  /* 0.812rem */\n  --foundation-caption:     10px;  /* 0.625rem */\n  --foundation-line-height: 120%;\n\n  /* ===================================================================\n     FOUNDATION — Elevation (8 levels)\n     =================================================================== */\n  --elevation-0: none;\n  --elevation-1: 0 1px 2px rgba(29,31,39,0.06);\n  --elevation-2: 0 2px 4px rgba(29,31,39,0.08), 0 1px 2px rgba(29,31,39,0.04);\n  --elevation-3: 0 4px 8px rgba(29,31,39,0.10), 0 2px 4px rgba(29,31,39,0.06);\n  --elevation-4: 0 8px 16px rgba(29,31,39,0.12), 0 2px 6px rgba(29,31,39,0.06);\n  --elevation-5: 0 12px 24px rgba(29,31,39,0.14), 0 4px 8px rgba(29,31,39,0.08);\n  --elevation-6: 0 16px 32px rgba(29,31,39,0.16), 0 6px 12px rgba(29,31,39,0.10);\n  --elevation-7: 0 24px 48px rgba(29,31,39,0.20), 0 10px 20px rgba(29,31,39,0.12);\n\n  /* ===================================================================\n     FOUNDATION — Spacing (8-point grid extension)\n     =================================================================== */\n  --space-fnd-4:  4px;   --space-fnd-8:  8px;   --space-fnd-12: 12px;\n  --space-fnd-16: 16px;  --space-fnd-20: 20px;  --space-fnd-24: 24px;\n  --space-fnd-32: 32px;  --space-fnd-40: 40px;  --space-fnd-48: 48px;\n  --space-fnd-56: 56px;  --space-fnd-64: 64px;  --space-fnd-72: 72px;\n  --space-fnd-80: 80px;\n\n  /* ===================================================================\n     FOUNDATION — Breakpoints\n     =================================================================== */\n  --bp-xs:  600px;   /* < 600  Extra Small Phone */\n  --bp-sm:  940px;   /* 600–940 Small Tablet */\n  --bp-md:  1264px;  /* 940–1264 Medium Laptop / Tablet */\n  --bp-lg:  1904px;  /* 1264–1904 Desktop Large */\n  /* > 1904 Full HD 4k */\n}\n\n/* =========================================================================\n   SEMANTIC TYPE CLASSES\n   Apply these to elements so that changing the role changes the look.\n   ========================================================================= */\n\n.t-display {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-black);\n  font-size: var(--text-display-size);\n  line-height: var(--text-display-lh);\n  letter-spacing: var(--text-display-ls);\n  color: var(--fg-default);\n}\n.t-h1 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-bold);\n  font-size: var(--text-h1-size);\n  line-height: var(--text-h1-lh);\n  letter-spacing: var(--text-h1-ls);\n  color: var(--fg-default);\n}\n.t-h2 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-bold);\n  font-size: var(--text-h2-size);\n  line-height: var(--text-h2-lh);\n  letter-spacing: var(--text-h2-ls);\n  color: var(--fg-default);\n}\n.t-h3 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-h3-size);\n  line-height: var(--text-h3-lh);\n  letter-spacing: var(--text-h3-ls);\n  color: var(--fg-default);\n}\n.t-h4 {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-h4-size);\n  line-height: var(--text-h4-lh);\n  color: var(--fg-default);\n}\n.t-subtitle {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-subtitle-size);\n  line-height: var(--text-subtitle-lh);\n  color: var(--fg-muted);\n}\n.t-body {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-body-size);\n  line-height: var(--text-body-lh);\n  color: var(--fg-default);\n}\n.t-body-sm {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-body-sm-size);\n  line-height: var(--text-body-sm-lh);\n  color: var(--fg-muted);\n}\n.t-caption {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-caption-size);\n  line-height: var(--text-caption-lh);\n  color: var(--fg-muted);\n}\n.t-eyebrow {\n  font-family: var(--font-primary);\n  font-weight: var(--fw-medium);\n  font-size: var(--text-eyebrow-size);\n  line-height: var(--text-eyebrow-lh);\n  letter-spacing: var(--text-eyebrow-ls);\n  text-transform: uppercase;\n  color: var(--fg-muted);\n}\n.t-cta {\n  font-family: var(--font-secondary);\n  font-weight: var(--fw-bold);\n  font-size: var(--text-cta-size);\n  line-height: var(--text-cta-lh);\n  letter-spacing: var(--text-cta-ls);\n}\n\n/* =========================================================================\n   BASE ELEMENT STYLES — apply defaults so unclassed HTML still looks right\n   ========================================================================= */\n\nhtml {\n  box-sizing: border-box;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n*, *::before, *::after { box-sizing: inherit; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-secondary);\n  font-size: var(--text-body-size);\n  line-height: var(--text-body-lh);\n  color: var(--fg-default);\n  background: var(--bg-page);\n}\n\nh1 { font: var(--fw-bold) var(--text-h1-size)/var(--text-h1-lh) var(--font-primary); letter-spacing: var(--text-h1-ls); margin: 0; }\nh2 { font: var(--fw-bold) var(--text-h2-size)/var(--text-h2-lh) var(--font-primary); letter-spacing: var(--text-h2-ls); margin: 0; }\nh3 { font: var(--fw-medium) var(--text-h3-size)/var(--text-h3-lh) var(--font-primary); letter-spacing: var(--text-h3-ls); margin: 0; }\nh4 { font: var(--fw-medium) var(--text-h4-size)/var(--text-h4-lh) var(--font-primary); margin: 0; }\np  { margin: 0 0 var(--space-4) 0; text-wrap: pretty; }\n\na {\n  color: var(--fg-link);\n  text-decoration: none;\n  transition: color var(--duration-fast) var(--ease-standard);\n}\na:hover { text-decoration: underline; }\na:focus-visible {\n  outline: var(--focus-ring-w) solid var(--border-focus);\n  outline-offset: 2px;\n  border-radius: var(--radius-sm);\n}\n\n/* =========================================================================\n   UTILITY: dark surface — apply to any section to invert text handling\n   ========================================================================= */\n.on-brand {\n  background: var(--bg-brand);\n  color: var(--fg-on-brand);\n}\n.on-brand h1, .on-brand h2, .on-brand h3, .on-brand h4,\n.on-brand .t-display, .on-brand .t-h1, .on-brand .t-h2, .on-brand .t-h3, .on-brand .t-h4 {\n  color: var(--fg-on-brand);\n}\n.on-brand .t-subtitle, .on-brand .t-body-sm, .on-brand .t-caption, .on-brand .t-eyebrow {\n  color: var(--fg-on-brand-muted);\n}\n.on-brand a { color: var(--color-green); }\n\n\nbody {\n  background: #0a1230;\n  margin: 0;\n  font-family: var(--font-primary);\n  color: var(--color-gray-light);\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ===== Page header (carousel meta + nav) ===== */\n.page {\n  max-width: 1240px;\n  margin: 0 auto;\n  padding: 48px 48px 96px;\n}\n.page-head {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 24px;\n  padding-bottom: 18px;\n  border-bottom: 1px solid rgba(237,237,237,.12);\n  margin-bottom: 36px;\n}\n.page-head .crumb {\n  font-family: var(--font-primary);\n  font-size: 12px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: rgba(237,237,237,.55);\n}\n.page-head .crumb a { color: inherit; text-decoration: none; }\n.page-head .crumb a:hover { color: var(--color-green); }\n.page-head h1 {\n  font-family: var(--font-primary);\n  font-weight: 900;\n  font-size: 32px;\n  letter-spacing: -0.01em;\n  color: var(--color-gray-light);\n  margin: 8px 0 0;\n}\n.page-head .meta {\n  font-family: var(--font-secondary);\n  font-size: 13px;\n  color: rgba(237,237,237,.6);\n  text-align: right;\n}\n\n/* ===== Slide grid (2-up at typical screen) ===== */\n.deck {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 24px;\n}\n.deck-cell {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n.deck-cell .num {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.1em;\n  color: rgba(237,237,237,.55);\n}\n.deck-cell .num b {\n  color: var(--color-gray-light);\n  font-weight: 700;\n}\n.deck-stage {\n  width: 100%;\n  aspect-ratio: 1080 / 1350;\n  background: #000;\n  border-radius: 18px;\n  overflow: hidden;\n  position: relative;\n  box-shadow: 0 20px 60px rgba(0,0,0,.4);\n}\n\n/* ===== The slide itself ===== */\n/* Each .slide is rendered at native 1080×1350, then scaled to fit its host */\n.slide {\n  width: 1080px;\n  height: 1350px;\n  position: absolute;\n  top: 0;\n  left: 0;\n  transform-origin: top left;\n  overflow: hidden;\n  font-family: var(--font-primary);\n  color: var(--color-navy);\n  background: var(--color-gray-light);\n}\n\n/* Color variants — derived from design system tokens */\n.slide.v-light    { background: #ededed; color: #172c66; }\n.slide.v-offwhite { background: #e6e6e3; color: #172c66; }\n.slide.v-navy     { background: #1d3574; color: #ededed; }\n.slide.v-navy-deep{ background: #172c66; color: #ededed; }\n.slide.v-blue     { background: #0120eb; color: #ededed; }\n.slide.v-pink     { background: #f173ac; color: #172c66; }\n.slide.v-yellow   { background: #f2f24b; color: #172c66; }\n.slide.v-green    { background: #40eb4f; color: #172c66; }\n.slide.v-gradient {\n  background: linear-gradient(135deg, #0120eb 0%, #40eb4f 100%);\n  color: #ededed;\n}\n\n/* The pgmark / handle chrome — sits as the slide's top edge */\n.s-chrome {\n  position: absolute;\n  inset: 80px 80px auto 80px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  z-index: 3;\n  min-height: 44px;\n}\n.s-chrome.s-chrome--bottom {\n  inset: auto 80px 80px 80px;\n}\n\n/* pg+ corner mark */\n.pgmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-primary);\n  font-weight: 900;\n  font-size: 44px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  color: inherit;\n}\n.pgmark svg {\n  width: 28px;\n  height: 28px;\n  display: block;\n  margin-top: 4px;\n}\n\n/* Style A — capsule with arrow (Cobrança Humanizada / Multicanal) */\n.cap-next {\n  width: 280px;\n  height: 56px;\n  border: 1.5px solid currentColor;\n  border-radius: 9999px;\n  display: flex;\n  align-items: center;\n  justify-content: flex-end;\n  padding: 0 24px;\n  color: inherit;\n  opacity: 0.95;\n}\n.cap-next svg { width: 18px; height: 18px; display: block; }\n\n/* Style B — handle + line + plus (universal across all carousels) */\n.handle {\n  font-family: var(--font-primary);\n  font-weight: 700;\n  font-size: 30px;\n  letter-spacing: -0.01em;\n  white-space: nowrap;\n}\n.handle-row {\n  display: flex;\n  align-items: center;\n  gap: 24px;\n  flex: 1;\n  justify-content: flex-end;\n  align-self: center;\n}\n.handle-line {\n  flex: 1;\n  max-width: 560px;\n  height: 2.5px;\n  background: currentColor;\n}\n.handle-plus {\n  width: 26px;\n  height: 26px;\n  flex-shrink: 0;\n  color: inherit;\n  display: block;\n}\n.handle-plus > svg, .handle-plus > use { width: 100%; height: 100%; display: block; }\n\n/* Header wrapper that uses an accent color for the line + plus + footer label */\n.s-chrome[data-accent] .handle-line,\n.s-chrome[data-accent] .handle-plus {\n  color: var(--accent);\n}\n\n/* Footer: section label + IG icons */\n.s-foot {\n  position: absolute;\n  inset: auto 80px 80px 80px;\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  z-index: 3;\n}\n.s-label {\n  font-family: var(--font-primary);\n  font-weight: 400;\n  font-size: 22px;\n  letter-spacing: 0.01em;\n  color: currentColor;\n  opacity: 0.85;\n}\n.s-label::before {\n  content: \"_ \";\n  opacity: 0.7;\n}\n.s-foot[data-accent] .s-label {\n  color: var(--accent);\n  opacity: 1;\n}\n.ig-icons {\n  display: flex;\n  align-items: center;\n  gap: 22px;\n}\n.ig-icons svg {\n  width: 38px;\n  height: 38px;\n  display: block;\n  color: inherit;\n}\n\n/* Bullet list with circled-plus icons (matches @pgmais editorial style) */\n.s-plus-list {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n  margin: 0;\n  padding: 0;\n  list-style: none;\n  font-family: var(--font-primary);\n}\n.s-plus-list > li {\n  display: grid;\n  grid-template-columns: 56px 1fr;\n  gap: 24px;\n  align-items: start;\n}\n.s-plus-list .pmark {\n  width: 32px; height: 32px;\n  flex-shrink: 0;\n  margin-top: 8px;\n  color: inherit;\n  display: block;\n}\n.s-plus-list .pmark > svg, .s-plus-list .pmark > use { width: 100%; height: 100%; display: block; }\n.s-plus-list .ptext {\n  font-weight: 700;\n  font-size: 36px;\n  line-height: 1.25;\n  text-wrap: pretty;\n}\n.s-plus-list .ptext small {\n  display: block;\n  font-weight: 400;\n  font-size: 28px;\n  line-height: 1.30;\n  margin-top: 6px;\n  opacity: 0.92;\n}\n\n/* ===== Slide content area ===== */\n.s-body {\n  position: absolute;\n  inset: 220px 80px 200px 80px;\n  display: flex;\n  flex-direction: column;\n  z-index: 2;\n}\n\n/* Canonical content frame: fills the space between header and footer text,\n   leaves ~80px above (for chrome) and ~80px below (for footer). */\n.s-content {\n  position: absolute;\n  inset: 180px 80px 180px 80px;\n  display: flex;\n  flex-direction: column;\n  z-index: 2;\n}\n.s-content--center  { justify-content: center; }\n.s-content--between { justify-content: space-between; }\n.s-content--start   { justify-content: flex-start; }\n.s-content--end     { justify-content: flex-end; }\n\n/* ===== Type roles inside slides ===== */\n.s-h-display { /* Cover headlines */\n  font-family: var(--font-primary);\n  font-weight: 900;\n  font-size: 76px;\n  line-height: 1.04;\n  letter-spacing: -0.02em;\n  margin: 0;\n  text-wrap: pretty;\n}\n.s-h-large {\n  font-family: var(--font-primary);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1.04;\n  letter-spacing: -0.02em;\n  margin: 0;\n  text-wrap: pretty;\n}\n.s-h-med {\n  font-family: var(--font-primary);\n  font-weight: 700;\n  font-size: 46px;\n  line-height: 1.10;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: pretty;\n}\n.s-h-it { /* italic accent */\n  font-family: var(--font-primary);\n  font-weight: 700;\n  font-style: italic;\n  font-size: 44px;\n  line-height: 1.15;\n  letter-spacing: -0.01em;\n  margin: 0;\n  text-wrap: pretty;\n}\n.s-body-text {\n  font-family: var(--font-primary);\n  font-weight: 400;\n  font-size: 32px;\n  line-height: 1.30;\n  margin: 0;\n  text-wrap: pretty;\n}\n.s-body-text b { font-weight: 900; font-style: italic; }\n.s-body-it {\n  font-family: var(--font-primary);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 32px;\n  line-height: 1.30;\n}\n.s-bullets {\n  font-family: var(--font-primary);\n  font-weight: 700;\n  font-size: 38px;\n  line-height: 1.25;\n  margin: 0;\n  padding-left: 56px;\n  list-style: none;\n}\n.s-bullets li {\n  position: relative;\n  padding: 8px 0;\n  text-wrap: pretty;\n}\n.s-bullets li::before {\n  content: \"\";\n  width: 12px;\n  height: 12px;\n  border-radius: 50%;\n  background: currentColor;\n  position: absolute;\n  left: -36px;\n  top: 26px;\n}\n.s-bullets--regular { font-weight: 400; }\n\n/* Image slot */\n.s-photo {\n  position: relative;\n  border-radius: 32px;\n  background: rgba(23,44,102,.08);\n  overflow: hidden;\n  box-shadow: 0 8px 32px rgba(0,0,0,.10);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: rgba(23,44,102,.45);\n  font-family: var(--font-secondary);\n  font-size: 14px;\n}\n.s-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.s-photo .ph-glyph {\n  display: flex; flex-direction: column; align-items: center; gap: 12px;\n  font-family: var(--font-primary); font-weight: 700; font-size: 18px;\n  letter-spacing: 0.06em; text-transform: uppercase; text-align: center;\n}\n.s-photo .ph-glyph svg { width: 56px; height: 56px; opacity: .6; }\n.slide.v-navy .s-photo, .slide.v-navy-deep .s-photo, .slide.v-blue .s-photo {\n  background: rgba(255,255,255,.08); color: rgba(255,255,255,.55);\n}\n\n/* Big outline number for Jornada */\n.s-bignum {\n  position: absolute;\n  left: 60px;\n  bottom: 140px;\n  font-family: var(--font-primary);\n  font-weight: 900;\n  font-size: 560px;\n  line-height: 0.8;\n  letter-spacing: -0.06em;\n  color: transparent;\n  -webkit-text-stroke: 4px currentColor;\n  z-index: 1;\n  user-select: none;\n  display: flex;\n  align-items: flex-end;\n  gap: 8px;\n}\n.s-bignum .dot {\n  width: 80px;\n  height: 80px;\n  border: 4px solid currentColor;\n  border-radius: 50%;\n  margin-bottom: 24px;\n  flex-shrink: 0;\n}\n\n/* Brand frame decorations — uses official gradient */\n.brand-frame {\n  position: absolute;\n  border-radius: 36px;\n  pointer-events: none;\n}\n.brand-frame::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  border-radius: 36px;\n  padding: 2px;\n  background: linear-gradient(135deg, #40eb4f 0%, #0120eb 100%);\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n  mask-composite: exclude;\n}\n\n/* Accent rule (brand gradient) */\n.s-rule {\n  height: 2px;\n  width: 320px;\n  background: linear-gradient(90deg, #40eb4f 0%, #0120eb 100%);\n  border-radius: 2px;\n  margin: 12px 0;\n}\n\n/* check / cross icons */\n.s-check, .s-cross {\n  display: inline-flex;\n  width: 56px;\n  vertical-align: middle;\n  margin-right: 18px;\n  flex-shrink: 0;\n}\n\n/* Stat block */\n.s-stat-num {\n  font-family: var(--font-primary);\n  font-weight: 900;\n  font-size: 96px;\n  line-height: 1;\n  letter-spacing: -0.03em;\n}\n\n/* Aura behind photo (for full-bleed feel without bg gradients) */\n.s-aura {\n  position: absolute;\n  pointer-events: none;\n}\n<\u002Fstyle>\n<style>\n  .deck { grid-template-columns: repeat(2, 1fr); }\n  @media (max-width: 920px) { .deck { grid-template-columns: 1fr; } }\n\n  /* Big outline number for the 4 numbered pillar slides */\n  .bignum {\n    position: absolute;\n    left: 40px;\n    bottom: 60px;\n    font-family: var(--font-primary);\n    font-weight: 900;\n    font-size: 580px;\n    line-height: 0.80;\n    letter-spacing: -0.06em;\n    color: transparent;\n    -webkit-text-stroke: 4.5px currentColor;\n    z-index: 1;\n    user-select: none;\n    display: flex;\n    align-items: flex-end;\n    gap: 14px;\n    pointer-events: none;\n  }\n  .bignum .dot {\n    width: 80px;\n    height: 80px;\n    border: 4.5px solid currentColor;\n    border-radius: 50%;\n    margin-bottom: 28px;\n    flex-shrink: 0;\n  }\n\n  .step-eyebrow {\n    font-family: var(--font-primary);\n    font-weight: 700;\n    font-size: 48px;\n    line-height: 1.06;\n    margin: 0 0 16px;\n  }\n  .step-title {\n    font-family: var(--font-primary);\n    font-weight: 700;\n    font-style: italic;\n    font-size: 56px;\n    line-height: 1.06;\n    margin: 0 0 36px;\n  }\n  .step-body {\n    font-family: var(--font-primary);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 34px;\n    line-height: 1.28;\n    max-width: 640px;\n    margin: 0;\n    text-wrap: pretty;\n  }\n  .step-bullets {\n    margin: 28px 0 0;\n    padding-left: 36px;\n    font-family: var(--font-primary);\n    font-weight: 400;\n    font-style: italic;\n    font-size: 34px;\n    line-height: 1.28;\n    max-width: 640px;\n  }\n  .step-bullets li { margin-bottom: 12px; text-wrap: pretty; }\n  .step-kicker {\n    font-family: var(--font-primary);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 36px;\n    line-height: 1.20;\n    margin: 40px 0 0;\n    max-width: 640px;\n    text-wrap: pretty;\n  }\n\n  .ph {\n    width: 100%; height: 100%;\n    border-radius: 32px;\n    overflow: hidden;\n    position: relative;\n    background: rgba(23,44,102,.06);\n    display: flex; align-items: center; justify-content: center;\n  }\n  .ph.dark-bg { background: rgba(255,255,255,.10); }\n  .ph .ph-text {\n    font-family: var(--font-primary);\n    font-weight: 700;\n    font-size: 22px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: rgba(23,44,102,.42);\n    text-align: center;\n    padding: 16px 32px;\n    line-height: 1.4;\n  }\n  .ph.dark-bg .ph-text { color: rgba(255,255,255,.55); }\n  .ph::after {\n    content: \"\"; position: absolute; inset: 0;\n    background-image: repeating-linear-gradient(135deg, transparent 0 32px, rgba(23,44,102,.04) 32px 33px);\n    pointer-events: none;\n  }\n  .ph.dark-bg::after { background-image: repeating-linear-gradient(135deg, transparent 0 32px, rgba(255,255,255,.05) 32px 33px); }\n\n  .accent-rule {\n    height: 2.5px;\n    width: 320px;\n    background: currentColor;\n    border-radius: 2px;\n    flex-shrink: 0;\n  }\n\n  /* Step-content position: top-aligned to the right of the bignum so the\n     two never overlap. Numbers live in the bottom-left as decoration. */\n  .step-content {\n    position: absolute;\n    inset: 200px 80px auto 380px;\n    display: flex;\n    flex-direction: column;\n    z-index: 2;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- PGMais brand symbol -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\">\n  <symbol id=\"pg-sym\" viewBox=\"0 0 24 24\">\n    <circle cx=\"12\" cy=\"12\" r=\"10.5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><\u002Fcircle>\n    <path d=\"M12 7.5v9M7.5 12h9\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath>\n  <\u002Fsymbol>\n<\u002Fsvg>\n\n<div class=\"page\">\n  <div class=\"page-head\">\n    <div>\n      <div class=\"crumb\"><a href=\"index.html\">Social<\u002Fa> &nbsp;/&nbsp; Carrossel 02<\u002Fdiv>\n      <h1>Jornada Completa de Cobrança<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      8 slides · 1080×1350 · Instagram Feed<br>\n      Sequência
